<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> DND 角色广场</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #1a0033; }
    .card { transition: all 0.3s; }
    .card:hover { transform: scale(1.05); box-shadow: 0 0 20px #a855f7; }
  </style>
</head>
<body class="bg-[#1a0033] text-white min-h-screen pb-20">
  <div class="max-w-2xl mx-auto p-4">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-3xl font-bold flex items-center gap-3">
        🎭  DND  剧本杀
        <span class="text-xs bg-[#a855f7] px-3 py-1 rounded-full">NSFW</span>
      </h1>
      <button onclick="createCard()" 
              class="bg-[#a855f7] hover:bg-[#9333ea] px-8 py-3 rounded-2xl font-bold flex items-center gap-2 shadow-lg">
        + 新建角色卡
      </button>
    </div>

    <input id="searchInput" onkeyup="loadRoles()" type="text" placeholder="搜索角色..." 
           class="w-full bg-[#2a0044] border border-white/10 rounded-2xl px-5 py-4 text-lg outline-none mb-8">

    <div id="rolesGrid" class="grid grid-cols-2 gap-4"></div>
  </div>

  <!-- 聊天窗口 -->
  <div id="chatModal" class="hidden fixed inset-0 bg-black/90 flex items-end z-50">
    <div class="bg-[#1a0033] w-full max-w-2xl mx-auto rounded-t-3xl h-[85vh] flex flex-col">
      <div class="p-4 border-b border-purple-500/30 flex items-center justify-between bg-[#2a0044]">
        <div id="modalTitle" class="font-bold text-xl"></div>
        <button onclick="closeChat()" class="text-3xl">×</button>
      </div>
      <div id="chatMessages" class="flex-1 p-4 overflow-y-auto space-y-4 bg-[#120022]"></div>
      <div class="p-4 border-t border-purple-500/30 bg-[#2a0044]">
        <div class="flex gap-3">
          <input id="chatInput" type="text" placeholder="输入消息..." 
                 class="flex-1 bg-[#1a0033] border border-white/10 rounded-2xl px-5 py-4 outline-none"
                 onkeypress="if(event.key==='Enter') sendMessage()">
          <button onclick="sendMessage()" class="bg-[#a855f7] px-8 rounded-2xl">发送</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const webApp = window.Telegram.WebApp;
    webApp.ready();
    const userId = webApp.initDataUnsafe.user?.id || 123;

    const API_BASE = "https://ai-bot-production-4ff0.up.railway.app";

    let currentCardId = null;

    async function loadRoles() {
      const res = await fetch(`${API_BASE}/api/roles`);
      const json = await res.json();
      const grid = document.getElementById('rolesGrid');
      grid.innerHTML = '';
      (json.data || []).forEach(card => {
        const div = document.createElement('div');
        div.className = 'card bg-[#2a0044] rounded-3xl overflow-hidden cursor-pointer p-4';
        div.innerHTML = `
          <div class="font-bold text-xl">${card.name}</div>
          <span class="bg-red-500 text-xs px-3 py-1 rounded-full">NSFW</span>
          <div class="text-white/70 text-sm mt-2">${card.system_prompt.substring(0,70)}...</div>
        `;
        div.onclick = () => openChat(card.id, card.name);
        grid.appendChild(div);
      });
    }

    async function createCard() {
      const name = prompt("角色名称？");
      const promptText = prompt("角色设定（系统提示词）？");
      if (!name || !promptText) return;
      await fetch(`${API_BASE}/api/create-card`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({owner_id: userId, name, system_prompt: promptText})
      });
      loadRoles();
    }

    function openChat(id, name) {
      currentCardId = id;
      document.getElementById('modalTitle').textContent = name;
      document.getElementById('chatModal').classList.remove('hidden');
      document.getElementById('chatMessages').innerHTML = '';
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const msg = input.value.trim();
      if (!msg || !currentCardId) return;
      const messages = document.getElementById('chatMessages');
      messages.innerHTML += `<div class="text-right"><div class="inline-block bg-purple-600 rounded-2xl px-5 py-3">${msg}</div></div>`;
      input.value = '';

      const res = await fetch(`${API_BASE}/api/chat`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({user_id: userId, message: msg, card_id: currentCardId})
      });
      const json = await res.json();
      messages.innerHTML += `<div class="text-left"><div class="inline-block bg-[#2a0044] rounded-2xl px-5 py-3">${json.reply || '收到！'}</div></div>`;
      messages.scrollTop = messages.scrollHeight;
    }

    function closeChat() {
      document.getElementById('chatModal').classList.add('hidden');
    }

    loadRoles();
  </script>
</body>
</html>
